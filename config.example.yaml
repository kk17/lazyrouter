# ============================================================
# LazyRouter Example Configuration (mainstream providers + ELO)
# ============================================================

serve:
  host: "0.0.0.0"
  port: 1234
  show_model_prefix: true  # Prepend assistant text with "[routed-model] ".
  debug: false
  # api_key: "set-an-internal-key-if-you-want-to-protect-the-router"
  # Exchange logs always include full request metadata; message bodies can be redacted via env:
  # LAZYROUTER_LOG_MESSAGE_CONTENT=0

# Providers map names -> credentials/endpoints.
# API keys are pulled from `.env` via ${...} substitution.
providers:
  openai:
    api_key: "${OPENAI_API_KEY}"
    api_style: openai

  anthropic:
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "https://api.anthropic.com"
    api_style: anthropic

  gemini:
    api_key: "${GOOGLE_API_KEY}"
    api_style: gemini

  openrouter:
    api_key: "${OPENROUTER_API_KEY}"
    base_url: "https://openrouter.ai/api"
    api_style: openai-completions

  github-copilot:
    api_key: "${GITHUB_TOKEN}"
    base_url: "https://api.githubcopilot.com"
    api_style: github-copilot

# Router configuration.
# mode: \"auto\" uses a cheap LLM to pick the best model per request.
# mode: \"fixed\" uses the first healthy model in config order (no LLM call, zero latency).
router:
  mode: auto   # \"auto\" or \"fixed\"
  provider: gemini
  model: "gemini-2.5-flash"
  # provider_fallback: openai
  # model_fallback: "gpt-4o-mini"
  context_messages: 10
  cache_estimated_minutes_per_message: 2.0  # Conservative cache-cost estimate cadence
  cache_create_input_multiplier: 1.25  # Estimated input cost multiplier on cache-create turn (> 0)
  cache_hit_input_multiplier: 0.10  # Estimated input cost multiplier on cache-hit turns
  # prompt: |  # Optional: override the default routing prompt
  #   You are a model router. Select the best model for the user's request.
  #   If the user explicitly requests a specific model, honor that request.
  #   Available models: {model_descriptions}
  #   Context: {context}
  #   Current request: {current_request}
  #   Respond with reasoning and model choice.

# Models that can be selected at runtime.
# ELO source suggestion: https://arena.ai/leaderboard
# - coding_elo: relative coding quality signal (higher is generally better)
# - writing_elo: relative writing quality signal (higher is generally better)
# ELO is optional for runtime, but useful for consistent routing preferences.
#
# fallback_models: Optional explicit fallback order per model.
# When a model hits a rate limit, LazyRouter tries these models in order
# instead of the default ELO-similarity ranking.
# Example: claude-sonnet can fall back to copilot-claude-sonnet, then gemini-2.5-flash.
llms:
  gemini-2.5-flash:
    description: "Very fast, cheap, and capable for most conversations and tool calling."
    provider: gemini
    model: "gemini-2.5-flash"
    input_price: 0.5
    output_price: 3.0
    coding_elo: 1443
    writing_elo: 1472

  gemini-2.5-pro:
    description: "More capable Gemini model for complex reasoning and coding."
    provider: gemini
    model: "gemini-2.5-pro"
    input_price: 2.0
    output_price: 12.0
    coding_elo: 1449
    writing_elo: 1486

  claude-sonnet-4-5:
    description: "Balanced quality model for coding and writing."
    provider: anthropic
    model: "claude-3-5-sonnet-latest"
    # cache_ttl: 5  # 5-minute prompt caching window (enables cache-aware estimation)
    # input_price: 3.0  # With cache_ttl set, router also computes est_cached_input_price
    input_price: 3.0
    output_price: 15.0
    coding_elo: 1386
    writing_elo: 1451
    fallback_models: ["copilot-claude-sonnet", "gemini-2.5-flash"]  # Try Copilot then Gemini on rate limit

  claude-opus-4-6:
    description: "High-quality model for difficult tasks; use when quality matters most."
    provider: anthropic
    model: "claude-opus-4-6"
    input_price: 5.0
    output_price: 25.0
    coding_elo: 1569
    writing_elo: 1501
    fallback_models: ["claude-sonnet-4-5", "copilot-claude-sonnet"]  # Degrade gracefully on rate limit

  gpt-4o-mini:
    description: "Fast and cost-effective OpenAI baseline."
    provider: openai
    model: "gpt-4o-mini"
    input_price: 0.15
    output_price: 0.60
    coding_elo: 1300
    writing_elo: 1400

  openrouter-grok-4-fast:
    description: "OpenRouter route for fast reasoning at moderate cost."
    provider: openrouter
    model: "x-ai/grok-4-fast-reasoning"
    input_price: 0.8
    output_price: 2.0
    coding_elo: 1237
    writing_elo: 1431

  copilot-gpt-4o:
    description: "GPT-4o via GitHub Copilot subscription (included in plan)."
    provider: github-copilot
    model: "gpt-4o"
    input_price: 0.0
    output_price: 0.0
    coding_elo: 1380
    writing_elo: 1430

  copilot-claude-sonnet:
    description: "Claude 3.5 Sonnet via GitHub Copilot subscription (included in plan)."
    provider: github-copilot
    model: "claude-3.5-sonnet"
    input_price: 0.0
    output_price: 0.0
    coding_elo: 1386
    writing_elo: 1451

  copilot-gemini-flash:
    description: "Gemini 2.0 Flash via GitHub Copilot subscription (included in plan)."
    provider: github-copilot
    model: "gemini-2.0-flash-001"
    input_price: 0.0
    output_price: 0.0
    coding_elo: 1350
    writing_elo: 1390

context_compression:
  history_trimming: true  # Master switch for deterministic history trimming.
  max_history_tokens: 10000  # Hard token budget for message history (system prompt excluded).
  keep_recent_exchanges: 8  # Preserve newest user-assistant exchanges uncompressed.
  keep_recent_user_turns_in_chained_tool_calls: 1  # Keep this many recent user turns untouched during chained tool calls.
  skip_router_on_tool_results: true  # Reuse previous selected model on tool-result follow-ups.

health_check:
  mode: periodical      # periodical (default) or on-start (run once at service boot)
  # Optional: probe only representative aliases per provider to reduce rate-limit usage.
  # Value can be a single alias string or a list of aliases.
  probe_models_by_provider:
    anthropic: "claude-sonnet-4-5"
    github-copilot: ["copilot-gpt-4o", "copilot-claude-sonnet"]
  interval: 300          # active interval in seconds while requests are flowing (default: 300)
  idle_after_seconds: 600  # after this much inactivity, pause background checks (default: 300)
  max_latency_ms: 15000  # models slower than this are unhealthy (default: 10000)
